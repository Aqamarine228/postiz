services:
  infra-ready:
    image: busybox:1.36
    container_name: postiz-infra-ready
    restart: "no"
    command:
      - sh
      - -ec
      - |
        until nc -z postiz-postgres 5432; do echo "waiting for postiz-postgres"; sleep 2; done
        until nc -z postiz-redis 6379; do echo "waiting for postiz-redis"; sleep 2; done
        until nc -z temporal 7233; do echo "waiting for temporal"; sleep 2; done
    networks:
      - postiz-network
      - temporal-network

  postiz:
    build:
      context: https://github.com/Aqamarine228/postiz-app-tiktok-fix.git
    image: postiz-app-tiktok-fix:latest
    container_name: postiz
    restart: always
    depends_on:
      infra-ready:
        condition: service_completed_successfully
    env_file:
      - ./.env
    volumes:
      - postiz-config:/config
      - postiz-uploads:/uploads
    ports:
      - "${POSTIZ_PORT}:5000"
    networks:
      - postiz-network
      - temporal-network

  spotlight:
    image: ghcr.io/getsentry/spotlight:latest
    pull_policy: always
    container_name: spotlight
    restart: unless-stopped
    ports:
      - "${SPOTLIGHT_PORT}:8969"
    networks:
      - postiz-network

networks:
  postiz-network:
    external: true
    name: ${POSTIZ_SHARED_NETWORK}
  temporal-network:
    external: true
    name: ${TEMPORAL_NETWORK}

volumes:
  postiz-config:
    external: true
    name: postiz-config
  postiz-uploads:
    external: true
    name: postiz-uploads
