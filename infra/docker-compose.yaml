services:
  postiz-postgres:
    image: postgres:17-alpine
    container_name: postiz-postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTIZ_POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTIZ_POSTGRES_USER}
      POSTGRES_DB: ${POSTIZ_POSTGRES_DB}
    volumes:
      - ${DATA_ROOT}/postgres/postiz:/var/lib/postgresql/data
    networks:
      - postiz-network
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTIZ_POSTGRES_USER} -d ${POSTIZ_POSTGRES_DB}
      interval: 10s
      timeout: 3s
      retries: 5

  postiz-redis:
    image: redis:7.2
    container_name: postiz-redis
    restart: always
    command:
      - redis-server
      - --appendonly
      - "yes"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - ${DATA_ROOT}/redis/postiz:/data
    networks:
      - postiz-network

  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    container_name: temporal-elasticsearch
    restart: always
    environment:
      cluster.routing.allocation.disk.threshold_enabled: "true"
      cluster.routing.allocation.disk.watermark.low: 512mb
      cluster.routing.allocation.disk.watermark.high: 256mb
      cluster.routing.allocation.disk.watermark.flood_stage: 128mb
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms256m -Xmx256m
      xpack.security.enabled: "false"
    expose:
      - "9200"
    volumes:
      - ${DATA_ROOT}/temporal/elasticsearch:/usr/share/elasticsearch/data
    networks:
      - temporal-network

  temporal-postgresql:
    image: postgres:16
    container_name: temporal-postgresql
    restart: always
    environment:
      POSTGRES_PASSWORD: ${TEMPORAL_POSTGRES_PASSWORD}
      POSTGRES_USER: ${TEMPORAL_POSTGRES_USER}
    expose:
      - "5432"
    volumes:
      - ${DATA_ROOT}/postgres/temporal:/var/lib/postgresql/data
    networks:
      - temporal-network
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${TEMPORAL_POSTGRES_USER}
      interval: 10s
      timeout: 3s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.28.1
    container_name: temporal
    restart: always
    depends_on:
      temporal-postgresql:
        condition: service_healthy
      temporal-elasticsearch:
        condition: service_started
    environment:
      DB: ${TEMPORAL_DB}
      DB_PORT: ${TEMPORAL_DB_PORT}
      POSTGRES_USER: ${TEMPORAL_POSTGRES_USER}
      POSTGRES_PWD: ${TEMPORAL_POSTGRES_PASSWORD}
      POSTGRES_SEEDS: ${TEMPORAL_POSTGRES_SEEDS}
      DYNAMIC_CONFIG_FILE_PATH: ${TEMPORAL_DYNAMIC_CONFIG_FILE_PATH}
      ENABLE_ES: ${TEMPORAL_ENABLE_ES}
      ES_SEEDS: ${TEMPORAL_ES_SEEDS}
      ES_VERSION: ${TEMPORAL_ES_VERSION}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE}
    ports:
      - "${TEMPORAL_PORT}:7233"
    volumes:
      - ./temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    networks:
      - temporal-network

  temporal-admin-tools:
    image: temporalio/admin-tools:1.28.1-tctl-1.18.4-cli-1.4.1
    container_name: temporal-admin-tools
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS}
      TEMPORAL_CLI_ADDRESS: ${TEMPORAL_CLI_ADDRESS}
    stdin_open: true
    tty: true
    depends_on:
      - temporal
    networks:
      - temporal-network

  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: temporal-ui
    restart: always
    environment:
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS}
      TEMPORAL_CORS_ORIGINS: ${TEMPORAL_CORS_ORIGINS}
    ports:
      - "${TEMPORAL_UI_PORT}:8080"
    networks:
      - temporal-network

  s3-backup:
    build:
      context: ./backup
    container_name: postiz-s3-backup
    restart: always
    environment:
      POSTIZ_POSTGRES_HOST: postiz-postgres
      TEMPORAL_POSTGRES_HOST: temporal-postgresql
      POSTIZ_CONFIG_PATH: /backup-source/postiz/config
      POSTIZ_UPLOADS_PATH: /backup-source/postiz/uploads
    env_file:
      - ./.env
    volumes:
      - ${DATA_ROOT}:/backup-source:ro
    depends_on:
      postiz-postgres:
        condition: service_healthy
      temporal-postgresql:
        condition: service_healthy
    networks:
      - postiz-network
      - temporal-network

networks:
  postiz-network:
    name: ${POSTIZ_SHARED_NETWORK}
  temporal-network:
    name: ${TEMPORAL_NETWORK}
